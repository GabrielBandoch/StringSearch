# ─────────────────────────────────────────────────────────────────────────────
# StringSearch — Stack de Observabilidade (Parte 2)
#
# Serviços:
#   jaeger      → UI em http://localhost:16686  (traces distribuídos)
#   prometheus  → UI em http://localhost:9090   (scraping de métricas)
#   grafana     → UI em http://localhost:3000   (dashboards)
#
# Uso:
#   docker-compose up -d
#   cd Backend/StringSearch.API && dotnet run
#   cd Frontend && npm start
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Jaeger (Traces) ─────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: stringsearch-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "5775:5775/udp" # Zipkin/Thrift (legacy)
      - "6831:6831/udp" # Jaeger Thrift Compact  ← usado pelo exporter .NET
      - "6832:6832/udp" # Jaeger Thrift Binary
      - "5778:5778" # Configuração
      - "16686:16686" # UI Jaeger
      - "14268:14268" # HTTP collector
      - "14250:14250" # gRPC collector
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    restart: unless-stopped

  # ── Prometheus (Métricas) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: stringsearch-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    # Aguarda o backend estar de pé para começar o scraping
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana (Dashboards) ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: stringsearch-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  grafana-data:
